AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SAM config for Tweeter server

Globals:
  Function:
    Runtime: nodejs24.x
    CodeUri: ./dist/
    Layers:
      - !Ref tweeterLayer
    Timeout: 30
    MemorySize: 128
    Environment:
      Variables:
        USER_TABLE_NAME: tweeter-user
        AUTH_TOKEN_TABLE_NAME: tweeter-auth-token
        FOLLOW_TABLE_NAME: tweeter-follow
        STATUS_TABLE_NAME: tweeter-status
        FEED_TABLE_NAME: tweeter-feed
        USER_IMAGE_BUCKET_NAME: !Ref tweeterUserImageBucket
        AUTH_TOKEN_TTL_SECONDS: 3600
        POST_STATUS_QUEUE_URL: !Ref tweeterPostStatusQueue
        UPDATE_FEED_QUEUE_URL: !Ref tweeterUpdateFeedQueue

Metadata:
  x-common-policies: &commonPolicies
    - AWSLambdaBasicExecutionRole
    - AmazonSESFullAccess
    - CloudWatchFullAccess
    - AmazonDynamoDBFullAccess
    - AmazonS3FullAccess
    - AmazonSQSFullAccess

  x-common-cors-headers: &commonCorsHeaders
    method.response.header.Access-Control-Allow-Origin: "'*'"

  x-common-swagger-response-headers: &commonSwaggerResponseHeaders
    Access-Control-Allow-Origin:
      type: string

Resources:
  tweeterApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: tweeter-api
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"
      DefinitionBody:
        swagger: "2.0"
        info:
          title: "Tweeter API"
          version: "1.0"
        x-common-consumes: &commonConsumes
          - application/json
        x-common-produces: &commonProduces
          - application/json
        x-common-request-templates: &commonRequestTemplates
          application/json: $input.json('$')
        x-common-amazon-responses: &commonAmazonResponses
          default:
            statusCode: 200
            responseParameters: *commonCorsHeaders
          ".*bad-request.*":
            statusCode: 400
            responseParameters: *commonCorsHeaders
            responseTemplates:
              application/json: '{ "error": "$input.path(''$.errorMessage'')" }'
          ".*unauthorized.*":
            statusCode: 401
            responseParameters: *commonCorsHeaders
            responseTemplates:
              application/json: '{ "error": "$input.path(''$.errorMessage'')" }'
          ".*internal-server-error.*":
            statusCode: 500
            responseParameters: *commonCorsHeaders
            responseTemplates:
              application/json: '{ "error": "$input.path(''$.errorMessage'')" }'
        x-common-swagger-responses: &commonSwaggerResponses
          "200":
            description: "OK"
            headers: *commonSwaggerResponseHeaders
          "400":
            description: "Bad Request"
            headers: *commonSwaggerResponseHeaders
          "401":
            description: "Unauthorized"
            headers: *commonSwaggerResponseHeaders
          "500":
            description: "Internal Server Error"
            headers: *commonSwaggerResponseHeaders
        paths:
          /user/get:
            post:
              summary: Get user
              description: Returns the profile information for a user by their alias.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterUserGetHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /user/register:
            post:
              summary: Register user
              description: Creates a new user account and returns the new user along with an auth token.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterUserRegisterHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /user/login:
            post:
              summary: Login
              description: Authenticates a user with their alias and password and returns an auth token.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterUserLoginHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /user/logout:
            post:
              summary: Logout
              description: Invalidates the current auth token, ending the user's session.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterUserLogoutHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /follow/status:
            post:
              summary: Check follow status
              description: Returns whether the authenticated user is currently following a given user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterFollowIsFollowerHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /follow/followers/list:
            post:
              summary: List followers
              description: Returns a paginated list of users who follow the specified user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterFollowListFollowersHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /follow/followees/list:
            post:
              summary: List followees
              description: Returns a paginated list of users that the specified user follows.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterFollowListFolloweesHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /follow/followers/count:
            post:
              summary: Get follower count
              description: Returns the total number of followers for the specified user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterFollowGetFollowersCountHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /follow/followees/count:
            post:
              summary: Get followee count
              description: Returns the total number of users that the specified user follows.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterFollowGetFolloweesCountHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /follow/create:
            post:
              summary: Follow user
              description: Creates a follow relationship so the authenticated user follows the specified user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterFollowCreateHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /follow/delete:
            post:
              summary: Unfollow user
              description: Removes the follow relationship so the authenticated user no longer follows the specified user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterFollowDeleteHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /status/story/list:
            post:
              summary: List story
              description: Returns a paginated list of statuses posted by the specified user (their story).
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterStatusListStoryHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /status/feed/list:
            post:
              summary: List feed
              description: Returns a paginated list of statuses from all users that the authenticated user follows.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterStatusListFeedHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

          /status/create:
            post:
              summary: Post status
              description: Creates a new status (tweet) on behalf of the authenticated user.
              consumes: *commonConsumes
              produces: *commonProduces
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: POST
                uri:
                  Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${tweeterStatusCreateHandlerFunction.Arn}/invocations
                requestTemplates: *commonRequestTemplates
                responses: *commonAmazonResponses
              responses: *commonSwaggerResponses

  tweeterLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: tweeter-layer
      Description: Dependencies layer for Tweeter server
      ContentUri: ./layer/
      CompatibleRuntimes:
        - nodejs24.x
      RetentionPolicy: DELETE

  tweeterUserGetHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-user-get-handler
      Handler: handlers/users/UserGetHandler.userGetHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /user/get
            Method: POST

  tweeterUserRegisterHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-user-register-handler
      Handler: handlers/users/UserRegisterHandler.userRegisterHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /user/register
            Method: POST

  tweeterUserLoginHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-user-login-handler
      Handler: handlers/users/UserLoginHandler.userLoginHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /user/login
            Method: POST

  tweeterUserLogoutHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-user-logout-handler
      Handler: handlers/users/UserLogoutHandler.userLogoutHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /user/logout
            Method: POST

  tweeterFollowIsFollowerHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-follow-is-follower-handler
      Handler: handlers/follows/FollowIsFollowerHandler.followIsFollowerHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /follow/status
            Method: POST

  tweeterFollowListFollowersHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-follow-list-followers-handler
      Handler: handlers/follows/FollowListFollowersHandler.followListFollowersHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /follow/followers/list
            Method: POST

  tweeterFollowListFolloweesHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-follow-list-followees-handler
      Handler: handlers/follows/FollowListFolloweesHandler.followListFolloweesHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /follow/followees/list
            Method: POST

  tweeterFollowGetFollowersCountHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-follow-get-followers-count-handler
      Handler: handlers/follows/FollowGetFollowersCountHandler.followGetFollowersCountHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /follow/followers/count
            Method: POST

  tweeterFollowGetFolloweesCountHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-follow-get-followees-count-handler
      Handler: handlers/follows/FollowGetFolloweesCountHandler.followGetFolloweesCountHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /follow/followees/count
            Method: POST

  tweeterFollowCreateHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-follow-create-handler
      Handler: handlers/follows/FollowCreateHandler.followCreateHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /follow/create
            Method: POST

  tweeterFollowDeleteHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-follow-delete-handler
      Handler: handlers/follows/FollowDeleteHandler.followDeleteHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /follow/delete
            Method: POST

  tweeterStatusListStoryHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-status-list-story-handler
      Handler: handlers/statuses/StatusListStoryHandler.statusListStoryHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /status/story/list
            Method: POST

  tweeterStatusListFeedHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-status-list-feed-handler
      Handler: handlers/statuses/StatusListFeedHandler.statusListFeedHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /status/feed/list
            Method: POST

  tweeterStatusCreateHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-status-create-handler
      Handler: handlers/statuses/StatusCreateHandler.statusCreateHandler
      Policies: *commonPolicies
      Events:
        ApiPost:
          Type: Api
          Properties:
            RestApiId: !Ref tweeterApi
            Path: /status/create
            Method: POST

  tweeterPostUpdateFeedMessagesHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-post-update-feed-messages-handler
      Handler: handlers/statuses/PostUpdateFeedMessagesHandler.postUpdateFeedMessagesHandler
      Policies: *commonPolicies
      Timeout: 300
      Events:
        PostStatusQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt tweeterPostStatusQueue.Arn
            BatchSize: 10

  tweeterUpdateFeedsHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: tweeter-update-feeds-handler
      Handler: handlers/statuses/UpdateFeedsHandler.updateFeedsHandler
      Policies: *commonPolicies
      Timeout: 60
      ReservedConcurrentExecutions: 1
      Events:
        UpdateFeedQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt tweeterUpdateFeedQueue.Arn
            BatchSize: 1

  tweeterPostStatusQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: tweeter-post-status-queue
      VisibilityTimeout: 360

  tweeterUpdateFeedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: tweeter-update-feed-queue
      VisibilityTimeout: 120

  tweeterUserImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub tweeter-user-images-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred

  tweeterUserImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref tweeterUserImageBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${tweeterUserImageBucket}/image/*

  tweeterUserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tweeter-user
      AttributeDefinitions:
        - AttributeName: alias
          AttributeType: S
      KeySchema:
        - AttributeName: alias
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  tweeterAuthTokenTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tweeter-auth-token
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
        - AttributeName: alias
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: tweeter-auth-token-alias-index
          KeySchema:
            - AttributeName: alias
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  tweeterFollowTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tweeter-follow
      AttributeDefinitions:
        - AttributeName: follower_alias
          AttributeType: S
        - AttributeName: followee_alias
          AttributeType: S
      KeySchema:
        - AttributeName: follower_alias
          KeyType: HASH
        - AttributeName: followee_alias
          KeyType: RANGE
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      GlobalSecondaryIndexes:
        - IndexName: tweeter-follow-followee-index
          KeySchema:
            - AttributeName: followee_alias
              KeyType: HASH
            - AttributeName: follower_alias
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

  tweeterStatusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tweeter-status
      AttributeDefinitions:
        - AttributeName: author_alias
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: author_alias
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  tweeterFeedTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tweeter-feed
      AttributeDefinitions:
        - AttributeName: recipient_alias
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
        - AttributeName: originator_alias
          AttributeType: S
      KeySchema:
        - AttributeName: recipient_alias
          KeyType: HASH
        - AttributeName: created_at
          KeyType: RANGE
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 20
        WriteCapacityUnits: 100
      GlobalSecondaryIndexes:
        - IndexName: tweeter-feed-originator-index
          KeySchema:
            - AttributeName: originator_alias
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5

Outputs:
  tweeterApiId:
    Description: API Gateway REST API ID
    Value: !Ref tweeterApi

  tweeterApiBaseUrl:
    Description: Base URL for the deployed Tweeter API
    Value: !Sub https://${tweeterApi}.execute-api.${AWS::Region}.amazonaws.com/prod

  tweeterUserImageBucketName:
    Description: S3 bucket used for user images
    Value: !Ref tweeterUserImageBucket

  tweeterPostStatusQueueUrl:
    Description: SQS queue URL used for post status fan-out messages
    Value: !Ref tweeterPostStatusQueue

  tweeterUpdateFeedQueueUrl:
    Description: SQS queue URL used for feed update work messages
    Value: !Ref tweeterUpdateFeedQueue
